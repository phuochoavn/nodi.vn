# ============================================================
# Cloudflare Real IP — resolve actual client IP
# ============================================================
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
real_ip_header CF-Connecting-IP;

# Sprint 168: Connection limit per device (backup layer for rate limiting)
limit_conn_zone $http_x_device_id zone=device_conn:10m;

# No rate limiting — API uses JWT auth for protection
# (1 store = up to 10 devices sharing same public IP)

server {
    listen 80;
    server_name nodi.vn www.nodi.vn api.nodi.vn;
    return 301 https://nodi.vn$request_uri;
}

server {
    listen 443 ssl;
    server_name nodi.vn www.nodi.vn api.nodi.vn;
    underscores_in_headers on;

    # Sprint 169: Docker DNS resolver — re-resolve IPs every 10s
    resolver 127.0.0.11 valid=10s;
    set $upstream_api http://nodi-api:3000;
    set $upstream_web http://nodi-web:3001;

    # Cloudflare Origin CA certificate
    ssl_certificate /etc/nginx/ssl/nodi.vn.pem;
    ssl_certificate_key /etc/nginx/ssl/nodi.vn.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' wss://nodi.vn https://nodi.vn; frame-ancestors 'self';" always;

    # Redirect www -> non-www
    if ($host = www.nodi.vn) {
        return 301 https://nodi.vn$request_uri;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    # WebSocket support chat (no rate limit for WS)
    location /api/support/ws {
        proxy_pass $upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket real-time sync (broadcast sync events to connected devices)
    # Sprint 164: 24h timeout for long-lived WS connections
    location /ws/sync {
        proxy_pass $upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Login endpoints — auth rate limit
    location = /api/login {
        limit_req zone=auth_strict burst=10 nodelay;
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1M;
    }

    location = /api/login-with-license {
        limit_req zone=auth_strict burst=10 nodelay;
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1M;
    }

    # Register endpoint — auth rate limit
    location = /api/auth/register {
        limit_req zone=auth_strict burst=10 nodelay;
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1M;
    }

    # Sync endpoints — rate limited per device connection (Sprint 168)
    location /api/sync {
        limit_conn device_conn 5;
        limit_conn_status 429;
        limit_req zone=sync_zone burst=20 nodelay;
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Serve uploaded product images as static files
    location /uploads/ {
        alias /opt/nodi/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Serve backup files for cloud restore
    location /backups/ {
        alias /opt/nodi/backups/;
        autoindex off;
    }

    # Serve installer downloads (.exe files)
    location /download/ {
        alias /opt/nodi/downloads/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }

    # All other API endpoints — no rate limit (auth required)
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static assets caching (Nuxt build output)
    location /_nuxt/ {
        proxy_pass $upstream_web$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Website → Nuxt SSR
    location / {
        proxy_pass $upstream_web$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-cache";
    }

    # Nginx health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
