server {
    listen 80;
    server_name nodi.vn www.nodi.vn api.nodi.vn;
    return 301 https://nodi.vn$request_uri;
}

server {
    listen 443 ssl;
    server_name nodi.vn www.nodi.vn api.nodi.vn;
    underscores_in_headers on;

    # Cloudflare Origin CA certificate
    ssl_certificate /etc/nginx/ssl/nodi.vn.pem;
    ssl_certificate_key /etc/nginx/ssl/nodi.vn.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect www -> non-www
    if ($host = www.nodi.vn) {
        return 301 https://nodi.vn$request_uri;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    # WebSocket support chat
    location /api/support/ws {
        proxy_pass http://nodi-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API → Axum (MUST be before / catch-all)
    location /api/ {
        proxy_pass http://nodi-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static assets caching (Nuxt build output)
    location /_nuxt/ {
        proxy_pass http://nodi-web:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Website → Nuxt SSR
    location / {
        proxy_pass http://nodi-web:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-cache";
    }

    # Nginx health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
