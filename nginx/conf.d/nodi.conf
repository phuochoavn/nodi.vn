# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=sync:10m rate=1r/s;

server {
    listen 80;
    server_name nodi.vn www.nodi.vn api.nodi.vn;
    return 301 https://nodi.vn$request_uri;
}

server {
    listen 443 ssl;
    server_name nodi.vn www.nodi.vn api.nodi.vn;
    underscores_in_headers on;

    # Cloudflare Origin CA certificate
    ssl_certificate /etc/nginx/ssl/nodi.vn.pem;
    ssl_certificate_key /etc/nginx/ssl/nodi.vn.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect www -> non-www
    if ($host = www.nodi.vn) {
        return 301 https://nodi.vn$request_uri;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    # WebSocket support chat (no rate limit for WS)
    location /api/support/ws {
        proxy_pass http://nodi-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Auth endpoint — strict rate limit: 3 req/min (anti brute-force)
    location = /api/login-with-license {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://nodi-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1M;
    }

    # Register endpoint — strict rate limit
    location = /api/auth/register {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://nodi-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1M;
    }

    # Sync endpoint — 1 req/s (heavy operation)
    location = /api/sync {
        limit_req zone=sync burst=3 nodelay;
        proxy_pass http://nodi-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Serve uploaded product images as static files
    location /uploads/ {
        alias /opt/nodi/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Serve backup files for cloud restore
    location /backups/ {
        alias /opt/nodi/backups/;
        autoindex off;
    }

    # All other API endpoints — 10 req/s
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://nodi-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static assets caching (Nuxt build output)
    location /_nuxt/ {
        proxy_pass http://nodi-web:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Website → Nuxt SSR
    location / {
        proxy_pass http://nodi-web:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-cache";
    }

    # Nginx health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
