worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Max upload size (cho backup .db files)
    client_max_body_size 100M;

    # ============================================
    # RATE LIMITING — Sprint 128
    # ============================================
    # Map Cloudflare real IP for rate limiting
    map $http_cf_connecting_ip $rate_limit_key {
        default $http_cf_connecting_ip;
        ""      $binary_remote_addr;
    }
    limit_req_zone $rate_limit_key zone=api_general:10m rate=30r/s;
    limit_req_zone $rate_limit_key zone=auth_strict:10m rate=5r/s;
    limit_req_zone $rate_limit_key zone=sync_zone:10m rate=10r/s;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
