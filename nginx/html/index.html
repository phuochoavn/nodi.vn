<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodi POS — Phần mềm quản lý cửa hàng vật tư nông nghiệp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f4c3a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; }
        .logo span { color: #4ade80; }
        .tagline { font-size: 1.2rem; color: #94a3b8; margin-bottom: 2rem; }
        .coming { font-size: 1.5rem; color: #fbbf24; font-weight: 600; }
        .contact { margin-top: 2rem; color: #64748b; }
        .contact a { color: #60a5fa; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌾 Nodi<span>POS</span></div>
        <p class="tagline">Phần mềm quản lý cửa hàng vật tư nông nghiệp thông minh</p>
        <p class="coming">🚧 Đang xây dựng — Sắp ra mắt!</p>
        <p class="contact">Liên hệ: <a href="tel:">Zalo/SĐT</a></p>
    </div>
</body>
</html>
