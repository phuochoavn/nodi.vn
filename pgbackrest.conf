[global]
# Sprint 166: Google Cloud Storage (replaced Cloudflare R2)
repo1-type=gcs
repo1-gcs-bucket=nodi-pos-backups
repo1-gcs-key=/etc/pgbackrest/gcs_service_account.json
repo1-path=/pg
repo1-retention-full=7
repo1-cipher-type=none
compress-type=zst
process-max=4
archive-async=y
spool-path=/var/spool/pgbackrest
log-path=/var/log/pgbackrest

[nodi_cluster]
pg1-path=/var/lib/postgresql/data
pg1-user=nodi_admin
