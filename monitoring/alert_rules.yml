# Sprint 166: Prometheus alert rules
groups:
  - name: pos_alerts
    rules:
    - alert: HighRequestLatency
      expr: histogram_quantile(0.95, sum(rate(axum_http_requests_duration_seconds_bucket[5m])) by (le)) > 2
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "API p95 latency > 2s"

    - alert: HighErrorRate
      expr: sum(rate(axum_http_requests_total{status=~"5.."}[5m])) / sum(rate(axum_http_requests_total[5m])) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "API error rate > 5%"

    - alert: PoolExhaustion
      expr: pg_stat_activity_count{state="active"} > 80
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL active connections > 80"

    - alert: DiskUsageHigh
      expr: (pg_database_size_bytes / 1073741824) > 20
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Database size > 20GB"

    - alert: ReplicationLag
      expr: pg_replication_lag > 300
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "PostgreSQL replication lag > 5min"
