<svg xmlns="http://www.w3.org/2000/svg" width="180" height="40" viewBox="0 0 180 40" fill="none">
  <!-- House + Leaf Icon -->
  <g transform="translate(2, 2)">
    <!-- House body -->
    <rect x="6" y="18" width="20" height="16" rx="2" fill="#0ea5e9" opacity="0.15"/>
    <rect x="6" y="18" width="20" height="16" rx="2" stroke="#0ea5e9" stroke-width="1.8" fill="none"/>
    <!-- House roof -->
    <path d="M3 20L16 8L29 20" stroke="#0ea5e9" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Door -->
    <rect x="13" y="25" width="6" height="9" rx="1" fill="#0ea5e9" opacity="0.3"/>
    <!-- Window left -->
    <rect x="8.5" y="21" width="4" height="4" rx="0.8" fill="#0ea5e9" opacity="0.25" stroke="#0ea5e9" stroke-width="0.8"/>
    <!-- Window right -->
    <rect x="19.5" y="21" width="4" height="4" rx="0.8" fill="#0ea5e9" opacity="0.25" stroke="#0ea5e9" stroke-width="0.8"/>
    <!-- Leaf sprouting from roof -->
    <path d="M20 12C20 12 24 6 28 4C28 4 26 12 20 14" fill="#22c55e"/>
    <path d="M20 13C20 13 23 8 27 5" stroke="#16a34a" stroke-width="0.8" stroke-linecap="round" fill="none"/>
    <!-- Small leaf -->
    <path d="M18 15C18 15 14 10 12 6C12 6 18 10 19 14" fill="#4ade80" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="40" y="17" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="11" fill="#0ea5e9" letter-spacing="0.5">
    <tspan>NODI</tspan>
  </text>
  <text x="40" y="33" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="14" fill="#0f172a">
    <tspan fill="#16a34a">POS</tspan>
  </text>
</svg>
